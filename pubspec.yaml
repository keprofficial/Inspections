name: kepr
description: Safety inspection application built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0
  intl: ^0.19.0
  supabase_flutter: ^2.12.4
  connectivity_plus: ^5.0.0
  camera: ^0.12.0+1
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
